<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chamado Express 2.0</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">CE</div>
        <div>
          <strong>Chamado Express</strong>
          <span>Atendimento 2.0</span>
        </div>
      </div>

      <div class="sidebar-header">
        <h2>Atalhos</h2>
        <span id="lblTotalAtalhos">0 itens</span>
      </div>

      <div id="atalhosList" class="shortcuts-list"></div>

      <button id="btnNovoAtalho" class="button button-dark" type="button">Novo Atalho</button>

      <label class="theme-toggle">
        <input type="checkbox" id="chkTema">
        <span>Tema escuro</span>
      </label>
    </aside>

    <main class="workspace">
      <header class="page-header">
        <div>
          <span class="eyebrow">Central de atendimento</span>
          <h1>Chamado Express 2.0</h1>
        </div>

        <div class="status-group">
          <span class="status-pill">Local</span>
          <span class="status-pill">Sem servidor</span>
        </div>
      </header>

      <section class="form-panel">
        <div class="section-heading">
          <h2>Registro do chamado</h2>
          <span>Modelo de resposta</span>
        </div>

        <div class="type-selector">
          <label class="type-option">
            <input type="radio" name="tipo" id="chkErro" value="Erro">
            <span>Erro</span>
          </label>
          <label class="type-option">
            <input type="radio" name="tipo" id="chkDuvida" value="Dúvida">
            <span>Dúvida</span>
          </label>
        </div>

        <div class="field">
          <label id="lblCausa" for="txtCausa">Causa do Erro/Dúvida</label>
          <textarea id="txtCausa" placeholder="Descreva o motivo do contato"></textarea>
        </div>

        <div class="field">
          <label for="txtSolucao">Solução</label>
          <textarea id="txtSolucao" class="textarea-large" placeholder="Registre a ação realizada"></textarea>
        </div>

        <div class="field-grid">
          <div class="field">
            <label for="txtFeedback">Feedback do Cliente</label>
            <textarea id="txtFeedback" placeholder="Registre o retorno do cliente"></textarea>
            <label class="check-option">
              <input type="checkbox" id="chkSemFeedback">
              <span>Agradeceu</span>
            </label>
          </div>

          <div class="field">
            <label for="txtUpsell">Oportunidade de Upsell</label>
            <textarea id="txtUpsell" placeholder="Registre a oportunidade identificada"></textarea>
            <label class="check-option">
              <input type="checkbox" id="chkSemUpsell">
              <span>Não tive oportunidade</span>
            </label>
          </div>
        </div>

        <div class="actions">
          <button id="btnCopiar" class="button button-primary" type="button">Copiar chamado</button>
          <span id="copyStatus" class="copy-status" aria-live="polite"></span>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
